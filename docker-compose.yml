services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: token_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    command: ['node', 'apps/indexer/dist/index.js']
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/token_intelligence
      BASE_RPC_URL: https://mainnet.base.org
      ROBINHOOD_RPC_URL: https://mainnet-rpc.robinhood.org
      ROBINHOOD_WS_URL: wss://mainnet-rpc.robinhood.org/ws
      ETHEREUM_RPC_URL: https://eth.merkle.io
      POLYGON_RPC_URL: https://polygon-rpc.com
      START_BLOCK: '0'
      BACKFILL_BLOCKS: '0'
      POLL_INTERVAL_MS: '12000'
      ENABLE_ETHEREUM: 'false'
      ENABLE_POLYGON: 'false'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      target: runner-api
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: '4000'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/token_intelligence
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: '*'
      RATE_LIMIT_WINDOW_MS: '60000'
      RATE_LIMIT_MAX: '100'
      BASE_RPC_URL: https://mainnet.base.org
      ROBINHOOD_RPC_URL: https://mainnet-rpc.robinhood.org
      ROBINHOOD_WS_URL: wss://mainnet-rpc.robinhood.org/ws
      ETHEREUM_RPC_URL: https://eth.merkle.io
      POLYGON_RPC_URL: https://polygon-rpc.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
